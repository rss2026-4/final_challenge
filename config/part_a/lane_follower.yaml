lane_detector:
  ros__parameters:
    camera_topic: "/zed/zed_node/rgb/image_rect_color"

    # White lane-line detection (HSV)
    white_lower_h: 0
    white_lower_s: 0
    white_lower_v: 200
    white_upper_h: 180
    white_upper_s: 60
    white_upper_v: 255

    # Fraction of image height to crop from the top (removes ceiling/walls)
    roi_top_pct: 0.46

    # Slanted left ROI — x-fraction of image width at the top and bottom of the ROI.
    # Anything left of this line is masked out (0.0 = no crop).
    left_roi_top_pct: 0.25
    left_roi_bottom_pct: -0.20

    # Slanted right ROI — x-fraction of image width measured from the right edge,
    # at the top and bottom of the ROI. Anything right of this line is masked out
    # (0.0 = no crop).
    right_roi_top_pct: 0.15
    right_roi_bottom_pct: -0.20

    # Canny edge detection thresholds
    canny_low: 50
    canny_high: 150

    # HoughLinesP parameters
    hough_threshold: 25
    hough_min_line_length: 25
    hough_max_line_gap: 30

    # Angle filter — degrees from horizontal (keep lines between these)
    min_angle_deg: 10.0
    max_angle_deg: 85.0

    # Choose the centerline point closest to this ground-plane distance.
    lookahead_distance_m: 2.0
    lookahead_samples: 80

    # Fallback fixed image row if homography-based sampling fails.
    lookahead_row_pct: 0.65

    # Fallback lane width in pixels when only one line is detected
    lane_width_px: 150.0

    # Bias the centerline horizontally in pixels (negative = left, positive = right).
    center_offset_px: -10.0

lane_follower:
  ros__parameters:
    drive_topic: "/vesc/high_level/input/nav_0"
    speed: 4.0
    wheelbase: 0.325
    max_steer: 0.34

    # Steering EMA: filtered = alpha * new + (1 - alpha) * previous.
    # 1.0 = no smoothing; lower values smooth more but add lag.
    steering_ema_alpha: 0.8
